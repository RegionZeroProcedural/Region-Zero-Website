<body>
        <img src="resources/banner.png" class="banner">
        <hr>
        <h1 class="contactTitle">Contact Region Zero</h1>

        <p class="contactSubtitle">
            Found a bug? Have a suggestion? We'd love to hear from you.
        </p>
        <div class="contactCard">
    <form>

        <div class="formRow">
            <label for="name">Name:</label>
            <input type="text" id="name" 
            placeholder="John Doe" />*
        </div>

        <div class="formRow">
            <label for="email">Email:</label>
            <input type="email" id="email" 
                placeholder="example@example.com" />*
        </div>

        <div class="formRow">
            <label for="text">Phone:</label>
            <input type="text" id="phone"
                placeholder="+1(123)456-7890" /><i>Optional</i>
        </div>

        <div class="formRow">
            <label for="text">Message:</label>
            <textarea
                placeholder="Tell us about bugs, suggestions, balance feedback, or anything you'd like to see in Region Zero...">
</textarea>
        </div>

        <button type="submit" class="btn2">Submit</button>

    </form>
</div>
    <footer>
        <p>© 2026 Region Zero. All Rights Reserved.</p>
    </footer>
</body>
